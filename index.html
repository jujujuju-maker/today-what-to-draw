<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>今天画什么 V2.2</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --bg: #f2efe7; --card: #fefcf8; --text: #2a2a28; --border: #e2dbcf; --accent: #c7b59b; --pointer: #3a3a35; --shadow: rgba(0, 0, 0, 0.05); }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Noto Sans CJK SC', '思源黑体', system-ui, sans-serif; touch-action: manipulation; }
    header { padding: 20px 24px 12px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
    h1 { font-size: clamp(28px, 8vw, 72px); line-height: 1; margin: 0; font-weight: 500; letter-spacing: -0.02em; }
    .skin-btn { background: var(--card); border: 1px solid var(--border); border-radius: 60px; padding: 8px 20px; font-size: 0.9rem; cursor: pointer; }
    .skin-panel { position: fixed; top: 80px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 18px; width: 260px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 1000; display: none; }
    .skin-panel.show { display: block; }
    .layout { padding: 16px 20px 40px; max-width: 1600px; margin: 0 auto; }
    .dashboard { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
    @media (max-width: 780px) { .dashboard { grid-template-columns: 1fr; gap: 24px; } .skin-panel { right: 10px; left: 10px; width: auto; } }
    .settings-panel { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 20px; display: flex; flex-direction: column; }
    .quick-themes { margin: 16px 0 0 0; padding: 12px; background: var(--bg); border-radius: 20px; }
    .quick-themes-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .quick-themes-title { font-size: 0.7rem; font-weight: 500; opacity: 0.7; }
    .refresh-themes-btn { background: none; border: none; font-size: 0.9rem; cursor: pointer; padding: 2px 6px; border-radius: 40px; }
    .quick-themes-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
    .quick-theme-btn { background: var(--card); border: 1px solid var(--border); border-radius: 40px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; }
    .wheel-list-section { margin-top: 16px; }
    .section-title { font-weight: 500; margin-bottom: 8px; font-size: 0.85rem; }
    .wheel-list { max-height: 420px; overflow-y: auto; margin-bottom: 12px; }
    .wheel-list-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 40px; font-size: 0.85rem; border: 1px solid var(--border); margin-bottom: 8px; background: var(--bg); position: relative; cursor: default; }
    .drag-handle { cursor: grab; font-size: 1.1rem; opacity: 0.5; padding: 0 4px; user-select: none; }
    .drag-handle:active { cursor: grabbing; }
    .wheel-list-item .wheel-name-display { flex: 1; cursor: pointer; }
    .wheel-list-item .wheel-name-input { flex: 1; background: transparent; border: none; font-size: 0.9rem; font-family: inherit; color: var(--text); padding: 4px 0; display: none; }
    .wheel-list-item.editing .wheel-name-display { display: none; }
    .wheel-list-item.editing .wheel-name-input { display: block; }
    .wheel-list-item button { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 4px; opacity: 0.6; }
    .bottom-buttons { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .bottom-buttons button { flex: 1; background: var(--card); border: 1px solid var(--border); }
    .db-btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .db-btn { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 40px; padding: 8px 0; font-size: 0.8rem; cursor: pointer; text-align: center; }
    .share-btn { background: #d4e0d4; border-color: #b8c9b0; }
    .wheels-grid { display: flex; flex-direction: column; gap: 24px; }
    .wheel-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 20px; position: relative; }
    .wheel-card .drag-handle-card { position: absolute; top: 20px; left: 20px; cursor: grab; font-size: 1.2rem; opacity: 0.4; z-index: 10; }
    .wheel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-left: 28px; padding-right: 40px; }
    .wheel-title { font-size: 1.3rem; font-weight: 520; background: none; border: none; border-bottom: 2px dotted transparent; font-family: inherit; color: var(--text); width: auto; min-width: 120px; padding: 4px 0; cursor: text; flex: 1; }
    .wheel-title:focus { outline: none; border-bottom-color: var(--accent); }
    .card-delete-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text); opacity: 0.5; padding: 6px 10px; border-radius: 40px; }
    .color-toggle-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 60px; padding: 6px 14px; font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .color-panel { background: var(--bg); border-radius: 20px; padding: 12px; margin-bottom: 16px; border: 1px solid var(--border); display: none; }
    .color-picker-list { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 10px; }
    .color-picker-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .color-picker-item input { width: 50px; height: 40px; border-radius: 12px; border: 2px solid var(--border); cursor: pointer; background: var(--card); }
    .color-editor-actions { display: flex; gap: 8px; margin-top: 6px; }
    .add-color-editor-btn, .remove-color-editor-btn { background: var(--card); border: 1px solid var(--border); border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; cursor: pointer; }
    .remove-color-editor-btn { background: #ffdddd; border-color: #ffaaaa; }
    .palette-suggest-local { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; margin-bottom: 8px; align-items: center; }
    .palette-suggest-item { display: flex; gap: 3px; background: var(--bg); padding: 4px 8px; border-radius: 40px; border: 1px solid var(--border); cursor: pointer; font-size: 0.7rem; }
    .palette-suggest-item .dot { width: 18px; height: 18px; border-radius: 30px; }
    .refresh-palette-btn { background: none; border: none; font-size: 0.8rem; cursor: pointer; padding: 4px 6px; border-radius: 40px; }
    .apply-all-btn { font-size: 0.7rem; padding: 4px 8px; background: var(--accent); color: white; border: none; border-radius: 40px; cursor: pointer; }
    .wheel-visual {
      display: flex;
      justify-content: center;
      margin: 24px 0 16px 0;
      cursor: pointer;
      position: relative;
    }
    .wheel-container { position: relative; width: min(280px, 70vw); height: min(280px, 70vw); margin: 0 auto; }
    .pointer-svg {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 20px solid var(--pointer);
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15));
      z-index: 10;
    }
    .wheel-svg-wrapper { width: 100%; height: 100%; }
    svg { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .items-editor { margin-top: 16px; }
    .tag-input-container { border: 1px solid var(--border); border-radius: 60px; background: var(--bg); padding: 6px 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 12px; min-height: 52px; }
    .tag {
      background: var(--accent);
      color: white;
      border-radius: 40px;
      padding: 4px 10px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tag .remove-tag { cursor: pointer; font-size: 0.8rem; opacity: 0.7; }
    .tag-input { flex: 1; min-width: 80px; background: transparent; border: none; padding: 6px 0; font-size: 0.85rem; outline: none; }
    .keyword-suggest { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; align-items: center; }
    .keyword-suggest .refresh-suggest-btn { background: none; border: none; font-size: 0.9rem; cursor: pointer; padding: 2px 6px; border-radius: 40px; margin-right: 4px; }
    .suggest-chip {
      background: var(--bg);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .result-area { margin-top: 24px; background: var(--card); border-radius: 32px; padding: 20px; border: 1px solid var(--border); }
    .final-proposition { background: var(--bg); padding: 14px 18px; border-radius: 40px; margin: 12px 0; font-size: clamp(0.85rem, 4vw, 1rem); }
    button { cursor: pointer; background: var(--card); border: 1px solid var(--border); border-radius: 60px; padding: 8px 16px; font-size: 0.85rem; }
    button:active { transform: scale(0.97); }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .modal-content { background: var(--card); border-radius: 36px; width: 90%; max-width: 600px; max-height: 80vh; overflow: auto; padding: 24px; border: 1px solid var(--border); }
    .color-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .global-floating-dropdown { position: fixed; background: var(--card); border: 1px solid var(--border); border-radius: 20px; max-height: 260px; overflow-y: auto; z-index: 10000; list-style: none; margin: 0; padding: 6px 0; box-shadow: 0 12px 28px rgba(0,0,0,0.25); min-width: 180px; display: none; }
    .global-floating-dropdown li { padding: 10px 14px; cursor: pointer; font-size: 0.85rem; }
    .empty-state-btn { text-align: center; padding: 40px; color: var(--accent); cursor: pointer; background: var(--card); border: 1px solid var(--border); border-radius: 32px; }
    .sortable-ghost { opacity: 0.4; background: var(--accent); border: 1px dashed var(--text); }
    .composite-panel { max-width: 550px; }
    .composite-search { width: 100%; padding: 8px 12px; border-radius: 40px; border: 1px solid var(--border); margin-bottom: 16px; background: var(--bg); }
    .composite-list { max-height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: 20px; padding: 8px; background: var(--bg); }
    .composite-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin: 4px 0; border-radius: 40px; cursor: pointer; transition: 0.05s; }
    .composite-item:hover { background: var(--card); }
    .composite-item.selected { background: var(--accent); color: white; }
    .composite-item .check { width: 20px; text-align: center; }
    .selected-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .selected-tag { background: var(--accent); color: white; border-radius: 40px; padding: 4px 12px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
    .selected-tag .remove { cursor: pointer; font-size: 0.9rem; opacity: 0.8; }
    .history-section { margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 12px; font-size: 0.75rem; }
    .history-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .history-clear, .history-toggle { background: none; border: 1px solid var(--border); border-radius: 40px; padding: 2px 10px; font-size: 0.7rem; cursor: pointer; }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item { background: var(--bg); border-radius: 20px; padding: 6px 12px; color: var(--text); opacity: 0.8; word-break: break-word; }
  </style>
</head>
<body>
<header>
  <h1>TODAY,<br>WHAT TO DRAW?</h1>
  <button class="skin-btn" id="skinToggleBtn">🎨 皮肤</button>
</header>
<div class="skin-panel" id="skinPanel">
  <div style="font-weight:600; margin-bottom:12px;">主题配色</div>
  <div class="color-row"><label>背景</label><input type="color" id="skinBg" value="#f2efe7"></div>
  <div class="color-row"><label>卡片</label><input type="color" id="skinCard" value="#fefcf8"></div>
  <div class="color-row"><label>文字</label><input type="color" id="skinText" value="#2a2a28"></div>
  <div class="color-row"><label>边框</label><input type="color" id="skinBorder" value="#e2dbcf"></div>
  <div style="display: flex; gap: 8px; margin-top: 12px;">
    <button id="applySkinBtn" style="flex:1;">✅ 应用并关闭</button>
    <button id="resetSkinBtn" style="flex:1;">重置默认</button>
  </div>
</div>
<div class="layout">
  <div class="dashboard">
    <div class="settings-panel">
      <h3 style="margin-top:0;">🎨 工坊</h3>
      <div class="quick-themes">
        <div class="quick-themes-header">
          <div class="quick-themes-title">⚡ 快捷主题 <span style="font-size:0.6rem;">点击直接创建转盘</span></div>
          <button class="refresh-themes-btn" id="refreshThemesBtn">🔄</button>
        </div>
        <div class="quick-themes-buttons" id="quickThemesButtons"></div>
      </div>
      <div class="wheel-list-section">
        <div class="section-title">📋 转盘列表（单击编辑）</div>
        <div id="wheelListPanel" class="wheel-list"></div>
      </div>
      <div class="bottom-buttons">
        <button id="newWheelBtn">✨ 新建转盘</button>
        <button id="compositeWheelBtn">📦 复合新建</button>
      </div>
      <div class="db-btn-group">
        <div class="db-btn" id="openKeywordLibBtn">📖 关键词库</div>
        <div class="db-btn" id="openThemeLibBtn">🏷️ 主题库</div>
        <div class="db-btn share-btn" id="shareUploadBtn">☁️ 共享词库</div>
      </div>
      <hr>
      <div style="display:flex; gap:8px;"><button id="exportDataBtn" style="flex:1">📤 导出</button><button id="importDataBtn" style="flex:1">📥 导入</button></div>
    </div>
    <div>
      <div id="wheelsContainer" class="wheels-grid"></div>
      <div class="result-area">
        <div class="result-title">🎲 完整命题</div>
        <div id="globalProposition" class="final-proposition">🌟 点击「新建转盘」或「快捷主题」开始创作</div>
        <div style="display: flex; gap: 12px; flex-wrap:wrap;"><button id="spinAllBtn">🎡 抽取所有转盘</button><button id="resetAllWheelsBtn">⟳ 重置角度</button></div>
        <div id="detailResult" style="margin-top: 12px;"></div>
        <div class="history-section" id="historySection">
          <div class="history-header">
            <span>📜 历史记录（最近10次）</span>
            <button id="clearHistoryBtn" class="history-clear" title="清空历史">🗑️</button>
            <button id="toggleHistoryBtn" class="history-toggle" style="display: none;">▼ 展开</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- 页脚签名 -->
  <div style="text-align: center; margin-top: 40px; padding: 16px; font-size: 0.7rem; opacity: 0.5; border-top: 1px solid var(--border);">
    🎨 @居居居居 制作
  </div>
</div>
<ul id="globalDropdown" class="global-floating-dropdown"></ul>

<script>
  // ========== 辅助函数 ==========
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  function darkenColor(hex, percent = 40) {
    if (!hex || hex === '#ddd') return '#3a3a35';
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    r = Math.max(0, Math.min(255, r - r*percent/100));
    g = Math.max(0, Math.min(255, g - g*percent/100));
    b = Math.max(0, Math.min(255, b - b*percent/100));
    return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }
  function randomPastel() { const hue = Math.floor(Math.random()*360); return `hsl(${hue},42%,70%)`; }
  function parseHashItems(str) { return str.split('#').map(s=>s.trim()).filter(s=>s); }
  function isPureNumeric(str) { return /^\d+$/.test(str); }
  
  function randomDistinct(arr, n) {
    if (n >= arr.length) return [...arr];
    const shuffled = [...arr];
    for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
    return shuffled.slice(0, n);
  }
  
  function getRadialTextParams(textLen) {
    if (textLen <= 6) return { fontSize: 14, startRadius: 90, step: -16 };
    if (textLen <= 9) return { fontSize: 11, startRadius: 95, step: -12 };
    return { fontSize: 9, startRadius: 100, step: -10 };
  }
  
  function confirmAddToCollection(word, collectionName, addCallback) {
    if (!word || word.trim() === "") { alert("内容不能为空"); return false; }
    if (isPureNumeric(word)) { alert("纯数字不能作为" + collectionName); return false; }
    if (confirm(`确定将「${word}」添加到${collectionName}库吗？`)) {
      addCallback(word.trim());
      return true;
    }
    return false;
  }
  
  // ========== 数据 ==========
  let globalKeywordDB = new Set(["少女","精灵","骑士","魔法师","森林","图书馆","海边","星空","机械","花朵","巨龙","机器人","巫婆","城堡","遗迹","浮空岛","蒸汽朋克","赛博朋克","日式庭院","神话生物","烛光","梦境","雨夜","暖阳","复古","未来城市","荒野","海底","甜品","可怕","恐惧"]);
  let themeDB = new Set(["人物","角色","场景","气氛","情感","色调","生物","建筑","天气","季节","职业","神话","科幻","奇幻","日常","抽象","材质","光影","风格","油画","前缀","后缀","综合"]);
  
  let wheelsData = [], nextId = 1, wheelRotations = new Map(), wheelNameCounter = 1;
  let historyRecords = [];
  let isHistoryExpanded = false;
  const MAX_HISTORY = 10;
  const STORAGE_KEY = 'draw_wheels_final_composite';
  
  function saveHistoryToLocal() { localStorage.setItem('draw_history', JSON.stringify(historyRecords)); }
  function loadHistoryFromLocal() { const stored = localStorage.getItem('draw_history'); if (stored) { try { historyRecords = JSON.parse(stored); } catch(e) {} } }
  function addHistoryRecord(text) { historyRecords.unshift({ text }); if (historyRecords.length > MAX_HISTORY) historyRecords.pop(); renderHistory(); saveHistoryToLocal(); }
  function clearHistory() { if (confirm('确定清空所有历史记录吗？')) { historyRecords = []; isHistoryExpanded = false; renderHistory(); saveHistoryToLocal(); } }
  function renderHistory() {
    const container = document.getElementById('historyList'); const toggleBtn = document.getElementById('toggleHistoryBtn');
    if (!container) return;
    if (historyRecords.length === 0) { container.innerHTML = '<div style="opacity:0.6; padding:8px;">暂无历史记录</div>'; if (toggleBtn) toggleBtn.style.display = 'none'; return; }
    let displayRecords = [...historyRecords]; const total = displayRecords.length;
    if (!isHistoryExpanded && total > 3) displayRecords = displayRecords.slice(0, 3);
    container.innerHTML = displayRecords.map(rec => `<div class="history-item">${escapeHtml(rec.text)}</div>`).join('');
    if (toggleBtn) { if (total > 3) { toggleBtn.style.display = 'inline-block'; toggleBtn.innerText = isHistoryExpanded ? '▲ 收起' : '▼ 展开'; } else toggleBtn.style.display = 'none'; }
  }
  function toggleHistoryExpand() { isHistoryExpanded = !isHistoryExpanded; renderHistory(); }
  
  function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ wheels: wheelsData, nextId, wheelNameCounter, rotations: Array.from(wheelRotations.entries()) })); }
  function saveKeywordDB() { localStorage.setItem("draw_keyword_db", JSON.stringify(Array.from(globalKeywordDB))); }
  function saveThemeDB() { localStorage.setItem("draw_theme_db", JSON.stringify(Array.from(themeDB))); }
  function loadFromLocal() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) try { const s = JSON.parse(raw); if (s.wheels) wheelsData = s.wheels.map(w => ({ ...w, colorPalette: w.colorPalette || [randomPastel()] })); nextId = s.nextId || 1; wheelNameCounter = s.wheelNameCounter || Math.max(1, wheelsData.length + 1); if (s.rotations) s.rotations.forEach(([k, v]) => wheelRotations.set(parseInt(k), v)); } catch(e) {}
  }
  function loadKeywordDB() { const raw = localStorage.getItem("draw_keyword_db"); if (raw) try { const arr = JSON.parse(raw); globalKeywordDB = new Set(arr); } catch(e) {} if (globalKeywordDB.size < 20) saveKeywordDB(); }
  function loadThemeDB() { const raw = localStorage.getItem("draw_theme_db"); if (raw) try { const arr = JSON.parse(raw); themeDB = new Set(arr); } catch(e) {} if (themeDB.size < 10) saveThemeDB(); }
  
  function getRandomSuggestionsForWheel(wheelId, excludeWords = []) {
    let pool = Array.from(globalKeywordDB);
    if (excludeWords.length) pool = pool.filter(w => !excludeWords.includes(w));
    const need = 10;
    if (pool.length <= need) return pool;
    return randomDistinct(pool, need);
  }
  function refreshSuggestionsForWheel(wheelId) {
    const wheel = wheelsData.find(w => w.id === wheelId);
    if (!wheel) return;
    if (!wheel._suggestions) wheel._suggestions = [];
    const newSuggestions = getRandomSuggestionsForWheel(wheelId, wheel.items || []);
    wheel._suggestions = newSuggestions;
    renderAll();
  }
  function removeSuggestAndAddNew(wheelId, usedWord) {
    const wheel = wheelsData.find(w => w.id === wheelId);
    if (!wheel) return;
    let sugg = wheel._suggestions || [];
    sugg = sugg.filter(w => w !== usedWord);
    let pool = Array.from(globalKeywordDB).filter(w => !sugg.includes(w) && !(wheel.items || []).includes(w));
    if (pool.length > 0) { const randomNew = pool[Math.floor(Math.random() * pool.length)]; sugg.push(randomNew); }
    if (sugg.length > 10) sugg = sugg.slice(0,10);
    wheel._suggestions = sugg;
    renderAll();
  }
  
  function buildWheelSVG(wheel) {
    const items = wheel.items || [];

    const angleStep = 360 / items.length;
    const sectorColors = getSectorColors(wheel.colorPalette, items.length);
    let paths = ''; const r = 118, cx = 130, cy = 130;
    for (let i = 0; i < items.length; i++) {
      const start = (angleStep * i - 90) * Math.PI / 180, end = (angleStep * (i + 1) - 90) * Math.PI / 180;
      const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start), x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
      const large = angleStep > 180 ? 1 : 0;
      paths += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${sectorColors[i]}" stroke="#fff" stroke-width="1.5"/>`;
    }
    let texts = '';
    for (let i = 0; i < items.length; i++) {

      }
    }
    return `<svg viewBox="0 0 260 260">${paths}${texts}<circle cx="130" cy="130" r="22" fill="#f0ede5" stroke="#e0dbd0" stroke-width="1"/><circle cx="130" cy="130" r="6" fill="#d6d0c4" opacity="0.4"/></svg>`;

    spinningSet.add(wheelId);
    const rand = Math.floor(Math.random() * wheel.items.length);
    const seg = 360 / wheel.items.length;
    const targetStopAngle = (360 - (rand * seg + seg / 2)) % 360;
    const g = document.getElementById(`wheelG-${wheelId}`);

    void g.offsetHeight;

  let activeDropdownInput = null, activeDropdownType = null, activeDropdownCallback = null;

  function showDropdown(input, suggestions, onSelect, type, retryOnFail) {
    const dd = document.getElementById('globalDropdown');
    if (!dd) return;
    if (!suggestions.length) { dd.style.display = 'none'; return; }
    const rect = input.getBoundingClientRect();
    if ((rect.width === 0 || rect.height === 0) && retryOnFail) {
      setTimeout(() => { showDropdown(input, suggestions, onSelect, type, false); }, 100);
      return;
    }
    dd.innerHTML = suggestions.map(s => `<li data-value="${escapeHtml(s)}">✨ ${escapeHtml(s)}</li>`).join('');
    dd.style.top = (rect.bottom + 4) + 'px';
    dd.style.left = rect.left + 'px';
    dd.style.width = Math.max(rect.width, 180) + 'px';
    dd.style.display = 'block';
    activeDropdownInput = input;
    activeDropdownType = type;
    activeDropdownCallback = onSelect;
    const handler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const val = e.currentTarget.dataset.value;
      if (activeDropdownCallback) {
        isBlurPending = false;
        activeDropdownCallback(val);
      }
      hideDropdown();
    };
    const lis = dd.querySelectorAll('li');
    lis.forEach(li => {
      li.removeEventListener('click', handler);
      li.removeEventListener('touchstart', handler);
      li.addEventListener('click', handler);
      li.addEventListener('touchstart', handler, { passive: false });
    });
  }
  function hideDropdown() { const dd = document.getElementById('globalDropdown'); if (dd) dd.style.display = 'none'; activeDropdownInput = null; activeDropdownType = null; activeDropdownCallback = null; }

    if (container) {
      container.addEventListener('click', e => { const visual = e.target.closest('.wheel-visual'); if (visual && visual.dataset.spin) spinWheelById(parseInt(visual.dataset.spin)); });
      container.addEventListener('change', e => { if (e.target.classList.contains('wheel-items')) { const wid = parseInt(e.target.dataset.wheel); const w = wheelsData.find(w => w.id === wid); if (w) w.items = parseHashItems(e.target.value); renderAll(); } });
    }
    document.addEventListener('click', e => { if (!e.target.closest('.wheel-title') && !e.target.closest('.tag-input') && !e.target.closest('.wheel-name-input') && !e.target.closest('#globalDropdown')) hideDropdown(); });
  }
  
  loadKeywordDB(); loadThemeDB(); loadFromLocal(); loadHistoryFromLocal();
  if (wheelsData.length === 0) wheelNameCounter = 1;
  renderAll();
  bindGlobalEvents();
  setupGlobalUI();
</script>
</body>
</html>
